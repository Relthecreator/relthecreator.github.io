<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rel's Pro Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        /* THE PRO STYLING */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0b0c10;
            background-image: radial-gradient(circle at top, #1f2833 0%, #0b0c10 100%);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: rgba(11, 12, 16, 0.8);
            border-bottom: 1px solid #45a29e;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: #66fcf1;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5), 0 0 20px rgba(102, 252, 241, 0.3);
        }

        p.subtitle {
            color: #c5c6c7;
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 50px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: #1f2833;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #2b3542;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #66fcf1;
            box-shadow: 0 15px 30px rgba(102, 252, 241, 0.2);
        }

        .game-image {
            width: 100%;
            height: 180px;
            background-color: #2b3542;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #45a29e;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            border-bottom: 2px solid #0b0c10;
        }

        .game-info {
            padding: 25px;
        }

        .game-info h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .game-info p {
            color: #c5c6c7;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .play-btn {
            display: block;
            text-align: center;
            background: linear-gradient(90deg, #45a29e 0%, #66fcf1 100%);
            color: #0b0c10;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.6);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <header>
        <h1>Rel's Arcade</h1>
        <p class="subtitle">Next-Gen Web Games</p>
    </header>

    <div class="arcade-grid">
        
        <div class="game-card">
            <div class="game-image">IMAGE PLACEHOLDER</div> 
            <div class="game-info">
                <h3>My Epic Game</h3>
                <p>This is where you write a cool, short description of your game to hype it up.</p>
                <a href="#" class="play-btn">LAUNCH GAME</a>
            </div>
        </div>
        </div>

</body>
</html>
