<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Upgraded Site</title>
  <style>
    /* This section is the CSS! */
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background-color: #1e1e1e;
      padding: 50px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      text-align: center;
      border-top: 5px solid #00ffcc;
    }
    h1 {
      color: #00ffcc;
      margin-top: 0;
      font-size: 3em;
    }
    p {
      color: #b3b3b3;
      font-size: 1.2em;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Much Better! 🚀</h1>
    <p>HTML is the skeleton. CSS is the outfit.</p>
  </div>

</body>
</html>
