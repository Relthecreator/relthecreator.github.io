<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rel The Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* MINIMALIST STYLING */
        :root {
            --bg: #fafafa;
            --text: #111111;
            --gray: #777777;
            --border: #eaeaea;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 700px; /* Keeps the text from stretching too far */
            margin: 0 auto;
            padding: 80px 20px;
            line-height: 1.6;
        }

        header { margin-bottom: 60px; }
        
        h1 { 
            font-size: 2.5rem; 
            font-weight: 600; 
            letter-spacing: -1px; 
            margin-bottom: 10px; 
        }
        
        header p { 
            color: var(--gray); 
            font-size: 1.1rem; 
        }
        
        h2 { 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--gray); 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 15px; 
            margin-bottom: 30px; 
        }
        
        /* The Project List */
        .project { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 25px 0; 
            border-bottom: 1px solid var(--border); 
            transition: opacity 0.2s; 
        }
        
        .project:hover { opacity: 0.6; }
        
        .project-info h3 { 
            font-size: 1.2rem; 
            font-weight: 600; 
            margin-bottom: 4px; 
        }
        
        .project-info p { 
            color: var(--gray); 
            font-size: 0.95rem; 
        }
        
        /* Clean Button */
        .play-link { 
            text-decoration: none; 
            color: var(--text); 
            font-weight: 600; 
            font-size: 0.9rem; 
            border: 1px solid var(--text); 
            padding: 8px 16px; 
            border-radius: 4px; 
            transition: all 0.2s; 
        }
        
        .play-link:hover { 
            background: var(--text); 
            color: var(--bg); 
        }
        
        footer { 
            margin-top: 80px; 
            color: var(--gray); 
            font-size: 0.85rem; 
        }
    </style>
</head>
<body>

    <header>
        <h1>Rel The Creator</h1>
        <p>Game Developer & Designer. Building things for the web.</p>
    </header>

    <main>
        <h2>Selected Projects</h2>
        
        <div class="project">
            <div class="project-info">
                <h3>Bluekit</h3>
                <p>My very first game hosted on the arcade.</p>
            </div>
            <a href="https://relthecreator.github.io/bluekit/" class="play-link">Play</a>
        </div>

        <div class="project">
            <div class="project-info">
                <h3>Project Two</h3>
                <p>In development...</p>
            </div>
            <a href="#" class="play-link">Play</a>
        </div>
        
        <div class="project">
            <div class="project-info">
                <h3>Project Three</h3>
                <p>In development...</p>
            </div>
            <a href="#" class="play-link">Play</a>
        </div>
    </main>

    <footer>
        <p>© 2026 Rel The Creator.</p>
    </footer>

</body>
</html>
